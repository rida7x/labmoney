<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#0d9488">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="مختبر الهيثم">
    <meta name="description" content="نظام إدارة مالية لمختبر الهيثم للتحاليل الطبية">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="64x64" href="icons/favicon.png">
    <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
    <title>مختبر الهيثم للتحاليل الطبية</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <!-- شاشة تسجيل الدخول -->
    <div id="loginScreen" class="login-screen">
        <div class="login-container">
            <div class="login-logo">
                <div class="logo-icon">
                    <i class="fas fa-microscope"></i>
                </div>
                <h1>مختبر الهيثم</h1>
                <p>للتحاليل الطبية</p>
            </div>
            <form id="loginForm" class="login-form">
                <div class="form-group">
                    <label><i class="fas fa-user"></i> اسم المستخدم</label>
                    <input type="text" id="loginUsername" required autocomplete="username" placeholder="أدخل اسم المستخدم">
                </div>
                <div class="form-group">
                    <label><i class="fas fa-lock"></i> كلمة المرور</label>
                    <input type="password" id="loginPassword" required autocomplete="current-password" placeholder="أدخل كلمة المرور">
                </div>
                <div id="loginError" class="login-error"></div>
                <button type="submit" class="btn-login">
                    <i class="fas fa-sign-in-alt"></i>
                    تسجيل الدخول
                </button>
                <div class="login-hint">
                    <i class="fas fa-info-circle"></i>
                    <span>افتراضياً: admin / admin123</span>
                </div>
            </form>
        </div>
    </div>

    <!-- التطبيق الرئيسي -->
    <div id="app" class="app hidden">
        <!-- الشريط الجانبي -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="lab-logo" id="sidebarLabLogo">
                    <i class="fas fa-microscope"></i>
                </div>
                <div class="lab-info">
                    <h2 id="labNameDisplay">مختبر الهيثم</h2>
                    <span>للتحاليل الطبية</span>
                </div>
                <button class="sidebar-close" onclick="toggleSidebar()">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <nav class="sidebar-nav">
                <a href="#" class="nav-item active" data-page="dashboard">
                    <i class="fas fa-chart-pie"></i>
                    <span>لوحة التحكم</span>
                </a>
                <a href="#" class="nav-item" data-page="revenues">
                    <i class="fas fa-coins"></i>
                    <span>الإيرادات</span>
                </a>
                <a href="#" class="nav-item" data-page="expenses">
                    <i class="fas fa-receipt"></i>
                    <span>المصروفات</span>
                </a>
                <a href="#" class="nav-item" data-page="debts">
                    <i class="fas fa-handshake"></i>
                    <span>الديون والموردين</span>
                </a>
                <a href="#" class="nav-item" data-page="patientDebts">
                    <i class="fas fa-user-injured"></i>
                    <span>ديون المرضى</span>
                </a>
                <a href="#" class="nav-item" data-page="contracts">
                    <i class="fas fa-file-contract"></i>
                    <span>التعاقدات</span>
                </a>
                <a href="#" class="nav-item" data-page="labtolab">
                    <i class="fas fa-vial"></i>
                    <span>Lab to Lab</span>
                </a>
                <a href="#" class="nav-item" data-page="employees">
                    <i class="fas fa-users"></i>
                    <span>الموظفين والرواتب</span>
                </a>
                <a href="#" class="nav-item" data-page="profitDist">
                    <i class="fas fa-handshake-angle"></i>
                    <span>تخصيص الأرباح</span>
                </a>
                <a href="#" class="nav-item" data-page="reports">
                    <i class="fas fa-chart-line"></i>
                    <span>التقارير</span>
                </a>
                <a href="#" class="nav-item" data-page="settings">
                    <i class="fas fa-cog"></i>
                    <span>الإعدادات</span>
                </a>
            </nav>
            <div class="sidebar-footer">
                <div class="user-info">
                    <div class="user-avatar">
                        <i class="fas fa-user-circle"></i>
                    </div>
                    <div>
                        <div id="currentUserName" class="user-name">المستخدم</div>
                        <div id="currentUserRole" class="user-role">مدير</div>
                    </div>
                </div>
                <button class="btn-logout" onclick="logout()">
                    <i class="fas fa-sign-out-alt"></i>
                </button>
            </div>
        </aside>

        <!-- المحتوى الرئيسي -->
        <main class="main-content">
            <!-- شريط علوي -->
            <header class="topbar">
                <button class="menu-toggle" onclick="toggleSidebar()">
                    <i class="fas fa-bars"></i>
                </button>
                <div class="topbar-title">
                    <h1 id="pageTitle">لوحة التحكم</h1>
                    <span id="currentDate"></span>
                </div>
                <div class="topbar-actions">
                    <button class="icon-btn" onclick="toggleTheme()" title="تبديل الوضع">
                        <i id="themeIcon" class="fas fa-moon"></i>
                    </button>
                    <button class="icon-btn" onclick="showNotifications()" title="الإشعارات">
                        <i class="fas fa-bell"></i>
                        <span id="notificationBadge" class="badge hidden">0</span>
                    </button>
                </div>
            </header>

            <!-- منطقة المحتوى -->
            <div class="content" id="content">
                <!-- يتم تحميل الصفحات هنا ديناميكياً -->
            </div>
        </main>

        <!-- خلفية الـ Sidebar للموبايل -->
        <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>
    </div>

    <!-- المودال العام -->
    <div id="modalOverlay" class="modal-overlay hidden" onclick="closeModalOnOverlay(event)">
        <div class="modal" id="modal">
            <div class="modal-header">
                <h3 id="modalTitle">عنوان</h3>
                <button class="modal-close" onclick="closeModal()">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="modal-body" id="modalBody"></div>
            <div class="modal-footer" id="modalFooter"></div>
        </div>
    </div>

    <!-- التنبيهات Toast -->
    <div id="toastContainer" class="toast-container"></div>

    <!-- شاشة تأكيد -->
    <div id="confirmDialog" class="modal-overlay hidden">
        <div class="modal modal-sm">
            <div class="modal-header">
                <h3 id="confirmTitle">تأكيد</h3>
            </div>
            <div class="modal-body">
                <p id="confirmMessage">هل أنت متأكد؟</p>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeConfirm()">إلغاء</button>
                <button class="btn btn-danger" id="confirmYes">تأكيد</button>
            </div>
        </div>
    </div>

    <script src="js/db.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/pdf-export.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/dashboard.js"></script>
    <script src="js/revenues.js"></script>
    <script src="js/expenses.js"></script>
    <script src="js/debts.js"></script>
    <script src="js/patient-debts.js"></script>
    <script src="js/contracts.js"></script>
    <script src="js/labtolab.js"></script>
    <script src="js/employees.js"></script>
    <script src="js/reports.js"></script>
    <script src="js/profit-distribution.js"></script>
    <script src="js/settings.js"></script>
    <script src="js/app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').catch(err => console.log('SW failed:', err));
            });
        }
    </script>
</body>
</html>
